<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>AfroLive — Join the Waitlist</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Montserrat", sans-serif;
      overflow-x: hidden;
    }

    .glow-top {
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 500px;
      background: radial-gradient(
        circle,
        rgba(244, 180, 0, 0.15) 0%,
        transparent 65%
      );
      pointer-events: none;
      z-index: 0;
    }

    .glow-bottom {
      position: fixed;
      right: -80px;
      bottom: -80px;
      width: 350px;
      height: 350px;
      background: radial-gradient(
        circle,
        rgba(244, 180, 0, 0.07) 0%,
        transparent 65%
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 560px;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .badge {
      margin-bottom: 2rem;
      padding: 7px 20px;
      border: 1px solid rgba(244, 180, 0, 0.3);
      border-radius: 100px;
      color: #f4b400;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      animation: fadeUp 0.6s ease both;
    }

    .headline {
      margin-bottom: 0.4rem;
      color: #f5f5f5;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(64px, 18vw, 100px);
      line-height: 0.9;
      letter-spacing: 3px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .headline span {
      color: #f4b400;
    }

    .divider {
      width: 36px;
      height: 2px;
      margin: 1.5rem auto;
      background: #f4b400;
      opacity: 0.5;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1.75rem;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    .pill {
      padding: 8px 16px;
      border: 1px solid rgba(244, 180, 0, 0.22);
      border-radius: 100px;
      background: rgba(244, 180, 0, 0.08);
      color: rgba(245, 245, 245, 0.8);
      font-size: 12px;
      font-weight: 500;
    }

    .subtext {
      max-width: 360px;
      margin: 0 auto 2.25rem;
      color: rgba(245, 245, 245, 0.5);
      font-size: 14px;
      line-height: 1.75;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .form-wrap {
      position: relative;
      display: flex;
      width: 100%;
      max-width: 460px;
      overflow: hidden;
      border: 1px solid rgba(244, 180, 0, 0.3);
      border-radius: 8px;
      background: #f5f5f5;
      transition:
        border-color 0.2s,
        opacity 0.2s;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .form-wrap:focus-within {
      border-color: rgba(244, 180, 0, 0.9);
    }

    .email-input {
      flex: 1;
      min-width: 0;
      padding: 15px 18px;
      border: none;
      outline: none;
      background: transparent;
      color: #0a0a0a;
      font-family: "Montserrat", sans-serif;
      font-size: 14px;
    }

    .email-input::placeholder {
      color: rgba(10, 10, 10, 0.38);
    }

    .join-btn {
      padding: 15px 22px;
      border: none;
      background: #f4b400;
      color: #0a0a0a;
      cursor: pointer;
      font-family: "Montserrat", sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
      transition:
        background 0.15s,
        transform 0.1s;
    }

    .join-btn:hover {
      background: #e0a700;
    }

    .join-btn:active {
      transform: scale(0.97);
    }

    .join-btn:disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
      transform: none;
    }

    .msg {
      min-height: 20px;
      margin-top: 1rem;
      font-size: 13px;
      font-weight: 500;
    }

    .msg.success {
      color: #f4b400;
    }

    .msg.error {
      color: #f06060;
    }

    .footer-note {
      margin-top: 3rem;
      color: rgba(245, 245, 245, 0.2);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .mailchimp-honeypot {
      position: absolute;
      left: -5000px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .form-wrap {
        flex-direction: column;
        overflow: visible;
        border: none;
        background: transparent;
        gap: 10px;
      }

      .email-input {
        width: 100%;
        border: 1px solid rgba(244, 180, 0, 0.3);
        border-radius: 8px;
        background: #f5f5f5;
      }

      .join-btn {
        width: 100%;
        border-radius: 8px;
      }
    }
  </style>
</head>

<body>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>

  <main class="container">
    <div class="badge">Live Music &middot; Afrobeats</div>

    <h1 class="headline">
      Afro<span>Live</span>
    </h1>

    <div class="divider"></div>

    <div class="pills">
      <span class="pill">Are you an Afrobeats fan?</span>
      <span class="pill">Do you enjoy live music?</span>
    </div>

    <p class="subtext">
      The next AfroLive experience is coming. Be the first to know —
      join the waitlist and we'll reach out when tickets drop.
    </p>

    <form class="form-wrap" id="waitlist-form" novalidate>
      <input
        class="email-input"
        type="email"
        id="email-input"
        name="EMAIL"
        placeholder="Enter your email address"
        autocomplete="email"
        required
      />

      <div class="mailchimp-honeypot" aria-hidden="true">
        <input
          type="text"
          name="b_af87a15cfaa62b72ea5217033_2d932c4375"
          tabindex="-1"
          autocomplete="off"
          value=""
        />
      </div>

      <button class="join-btn" id="join-btn" type="submit">
        Join waitlist
      </button>
    </form>

    <p class="msg" id="msg" aria-live="polite"></p>

    <p class="footer-note">No spam. Just the drop.</p>
  </main>

  <script>
    const form = document.getElementById("waitlist-form");
    const input = document.getElementById("email-input");
    const button = document.getElementById("join-btn");
    const message = document.getElementById("msg");

    const MAILCHIMP_ENDPOINT =
      "https://afrolivee.us2.list-manage.com/subscribe/post-json";

    function setLoading(isLoading) {
      button.disabled = isLoading;
      button.textContent = isLoading
        ? "Joining..."
        : "Join waitlist";
    }

    function showMessage(type, text) {
      message.className = `msg ${type}`;
      message.textContent = text;
    }

    function cleanMailchimpMessage(value) {
      const parsedDocument = new DOMParser().parseFromString(
        value || "",
        "text/html"
      );

      return (
        parsedDocument.body.textContent
          ?.replace(/^\d+\s*-\s*/, "")
          .trim() ||
        "Something went wrong. Please try again."
      );
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      if (!input.checkValidity()) {
        input.reportValidity();
        return;
      }

      const email = input.value.trim();
      const callbackName = `mailchimpCallback_${Date.now()}`;

      setLoading(true);
      message.className = "msg";
      message.textContent = "";

      const parameters = new URLSearchParams({
        u: "af87a15cfaa62b72ea5217033",
        id: "2d932c4375",
        f_id: "005d53e0f0",
        EMAIL: email,
        b_af87a15cfaa62b72ea5217033_2d932c4375: "",
        c: callbackName
      });

      const requestScript = document.createElement("script");
      let timeoutId;

      function cleanup() {
        clearTimeout(timeoutId);
        requestScript.remove();

        try {
          delete window[callbackName];
        } catch {
          window[callbackName] = undefined;
        }
      }

      window[callbackName] = function (response) {
        cleanup();

        const responseText = cleanMailchimpMessage(response.msg);
        const isAlreadySubscribed =
          /already subscribed/i.test(responseText);

        if (response.result === "success") {
          showMessage(
            "success",
            "You're on the list. We'll see you soon. 🎶"
          );

          input.value = "";
          form.style.opacity = "0.5";
          button.textContent = "Joined ✓";
          button.disabled = true;

          return;
        }

        if (isAlreadySubscribed) {
          showMessage(
            "success",
            "You're already on the waitlist."
          );

          setLoading(false);
          return;
        }

        showMessage("error", responseText);
        setLoading(false);
      };

      requestScript.onerror = function () {
        cleanup();

        showMessage(
          "error",
          "Something went wrong. Please try again."
        );

        setLoading(false);
      };

      timeoutId = window.setTimeout(function () {
        cleanup();

        showMessage(
          "error",
          "The request timed out. Please try again."
        );

        setLoading(false);
      }, 15000);

      requestScript.src =
        `${MAILCHIMP_ENDPOINT}?${parameters.toString()}`;

      document.body.appendChild(requestScript);
    });
  </script>
</body>
</html>
